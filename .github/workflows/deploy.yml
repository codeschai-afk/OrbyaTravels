name: Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  ORG: codeschai-afk

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [web, provider, employee, admin, api]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.app }}.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.ORG }}/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  deploy:
    name: Deploy to Droplet
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e
            cd /opt/orbya

            export IMAGE_TAG=${{ github.sha }}

            # Pull all new images
            docker compose -f docker/docker-compose.prod.yml pull

            # Restart with zero-downtime (Caddy stays up, app containers replace one by one)
            docker compose -f docker/docker-compose.prod.yml up -d --remove-orphans

            # Remove dangling images to save disk space
            docker image prune -f
