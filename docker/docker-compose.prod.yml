services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - provider
      - employee
      - admin
      - api

  migrate:
    image: ghcr.io/codeschai-afk/api:${IMAGE_TAG}
    user: root
    working_dir: /app
    command:
      - sh
      - -c
      - |
        echo 'DELETE FROM "_prisma_migrations" WHERE finished_at IS NULL;' | \
          packages/db/node_modules/.bin/prisma db execute --schema packages/db/schema.prisma --stdin 2>/dev/null || true
        packages/db/node_modules/.bin/prisma migrate deploy --schema packages/db/schema.prisma
    env_file: ../.env.prod
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    image: ghcr.io/codeschai-afk/web:${IMAGE_TAG}
    restart: unless-stopped
    env_file: ../.env.prod
    environment:
      NEXTAUTH_URL: https://orbyatravel.com
    depends_on:
      migrate:
        condition: service_completed_successfully

  provider:
    image: ghcr.io/codeschai-afk/provider:${IMAGE_TAG}
    restart: unless-stopped
    env_file: ../.env.prod
    environment:
      NEXTAUTH_URL: https://provider.orbyatravel.com
    depends_on:
      migrate:
        condition: service_completed_successfully

  employee:
    image: ghcr.io/codeschai-afk/employee:${IMAGE_TAG}
    restart: unless-stopped
    env_file: ../.env.prod
    environment:
      NEXTAUTH_URL: https://staff.orbyatravel.com
    depends_on:
      migrate:
        condition: service_completed_successfully

  admin:
    image: ghcr.io/codeschai-afk/admin:${IMAGE_TAG}
    restart: unless-stopped
    env_file: ../.env.prod
    environment:
      NEXTAUTH_URL: https://admin.orbyatravel.com
    depends_on:
      migrate:
        condition: service_completed_successfully

  api:
    image: ghcr.io/codeschai-afk/api:${IMAGE_TAG}
    restart: unless-stopped
    env_file: ../.env.prod
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      meilisearch:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    command: >
      postgres
        -c shared_buffers=128MB
        -c max_connections=50
        -c work_mem=4MB

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  meilisearch:
    image: getmeili/meilisearch:v1.9
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY}
      MEILI_MAX_INDEXING_MEMORY: 200mb
    volumes:
      - meilisearch_data:/meili_data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/orbya-images;
        mc mb --ignore-existing local/orbya-tiles;
        mc anonymous set download local/orbya-images;
        mc anonymous set download local/orbya-tiles;
        echo 'MinIO buckets ready.';
      "
    restart: "no"

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
